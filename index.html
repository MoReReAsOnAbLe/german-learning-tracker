<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deutsch Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>
  <div id="app">
    <!-- Sidebar -->
    <aside id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <span class="logo-flag">🇩🇪</span>
          <span class="logo-text">Deutsch Tracker</span>
        </div>
      </div>

      <nav class="sidebar-nav">
        <a href="#dashboard" class="nav-item active" data-page="dashboard">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          Dashboard
        </a>
        <a href="#library" class="nav-item" data-page="library">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 10l4.553-2.069A1 1 0 0121 8.87V15.13a1 1 0 01-.553.9L15 14M3 8a2 2 0 012-2h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z"/></svg>
          Video Library
        </a>
        <a href="#calendar" class="nav-item" data-page="calendar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          Calendar
        </a>
        <a href="#settings" class="nav-item" data-page="settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
          Settings
        </a>
      </nav>

      <div class="sidebar-stats">
        <div class="stat-row">
          <span class="stat-label">Total watched</span>
          <span class="stat-value" id="sidebar-total-hours">0h</span>
        </div>
        <div class="sidebar-progress-bar">
          <div class="sidebar-progress-fill" id="sidebar-progress-fill" style="width:0%"></div>
        </div>
        <div class="stat-row stat-row-sub">
          <span class="stat-label-muted" id="sidebar-progress-pct">0% of 1,500h goal</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-row">
          <span class="stat-label">🔥 Streak</span>
          <span class="stat-value" id="sidebar-streak">0 days</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Today</span>
          <span class="stat-value" id="sidebar-today">0 min</span>
        </div>
        <div class="today-goal-bar">
          <div class="today-goal-fill" id="sidebar-today-fill" style="width:0%"></div>
        </div>
      </div>
    </aside>

    <!-- Main content -->
    <main id="main-content">
      <!-- Pages rendered here by JS -->
    </main>
  </div>

  <!-- Video Player Modal -->
  <div id="player-modal" class="modal hidden" role="dialog" aria-modal="true" aria-label="Video player">
    <div class="modal-backdrop" id="player-backdrop"></div>
    <div class="modal-content player-modal-content">
      <button class="modal-close" id="player-close" aria-label="Close player">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <div id="player-container">
        <div id="youtube-player"></div>
      </div>
      <div class="player-info">
        <div class="player-meta">
          <h2 id="player-title" class="player-title"></h2>
          <span id="player-channel" class="player-channel"></span>
        </div>
        <div class="player-controls-row">
          <div class="player-difficulty-group">
            <label>Difficulty:</label>
            <div class="difficulty-checkboxes" id="player-difficulty-checks">
              <label><input type="checkbox" value="A1"> A1</label>
              <label><input type="checkbox" value="A2"> A2</label>
              <label><input type="checkbox" value="B1"> B1</label>
              <label><input type="checkbox" value="B2"> B2</label>
              <label><input type="checkbox" value="C1"> C1</label>
              <label><input type="checkbox" value="C2"> C2</label>
            </div>
          </div>
          <div class="player-tags-group">
            <label for="player-tags">Tags:</label>
            <input type="text" id="player-tags" class="tags-input" placeholder="e.g. greetings, travel" />
          </div>
          <div class="player-session-time">
            <span>Session: </span><span id="player-session-seconds">0s</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Import Modal -->
  <div id="import-modal" class="modal hidden" role="dialog" aria-modal="true" aria-label="Import channel">
    <div class="modal-backdrop" id="import-backdrop"></div>
    <div class="modal-content import-modal-content">
      <button class="modal-close" id="import-close" aria-label="Close import">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <h2 class="modal-title">Import YouTube Channel</h2>
      <p class="modal-subtitle">Enter a YouTube channel handle or URL. All videos will be added to your library.</p>
      <label class="import-option-row">
        <input type="checkbox" id="import-skip-shorts" checked />
        <span>Skip YouTube Shorts (≤ 60 seconds)</span>
      </label>
      <div class="import-input-row">
        <input type="text" id="import-input" class="import-channel-input" placeholder="@ComprehensibleGerman or youtube.com/@..." />
        <button id="import-btn" class="btn btn-accent">Import</button>
      </div>
      <div id="import-progress" class="import-progress hidden">
        <div class="import-progress-bar-wrap">
          <div class="import-progress-bar-fill" id="import-progress-fill" style="width:0%"></div>
        </div>
        <p id="import-progress-text" class="import-progress-text">Starting import...</p>
      </div>
      <div id="import-error" class="import-error hidden"></div>
      <div id="import-success" class="import-success hidden"></div>
    </div>
  </div>

  <!-- Scripts — load store and youtube first, then all others -->
  <script type="module" src="js/store.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
